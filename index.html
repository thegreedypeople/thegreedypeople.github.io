<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>thgrdyppl</title>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            /* font-family: Arial, Helvetica, sans-serif; */
        }
        
        .hero-image {
            background-image: url("res/img/backdrop_slide.png");
            height: 97%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            background-color: gray;
        }
        
        .hero-text {
            /* text-align: center; */
            position: absolute;
            /* top: 50%; */
            top: 10px;
            /* left: 50%; */
            left: 20px;
            /* transform: translate(-50%, -50%); */
            color: black;
            text-shadow: 1px 1px 4px white;
        }
        
        .hero-text button {
            border: none;
            outline: 0;
            display: inline-block;
            padding: 10px 25px;
            color: black;
            background-color: #ddd;
            text-align: center;
            cursor: pointer;
        }
        
        .hero-text button:hover {
            background-color: #555;
            color: white;
        }
        
        .grad_rasta {
            height: 3px!important;
            background-image: linear-gradient(to bottom, red, yellow, green);
        }
        
        .animate-me {
            animation: 25s infinite bgcolorchange;
        }
        
        @keyframes bgcolorchange {
            0% {
                background-color: white;
            }
            25% {
                background-color: gray;
            }
            50% {
                background-color: black;
            }
            75% {
                background-color: gray;
            }
            100% {
                background-color: white;
            }
        }
        
        @-webkit-keyframes bgcolorchange {
            0% {
                background-color: white;
            }
            25% {
                background-color: gray;
            }
            50% {
                background-color: black;
            }
            75% {
                background-color: gray;
            }
            100% {
                background-color: white;
            }
        }
    </style>
</head>

<body>

    <div class="hero-image">
        <div class="hero-text">
            <span style="font-size:8vw;">thegreedypeople</span>
        </div>
    </div>
    <div class="grad_rasta"></div>

    <!-- <p>Page Content..</p> -->
<p style="text-align:center;">2018</p>
</body>

</html>
